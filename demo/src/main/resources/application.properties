# Server name, used for distributed ID generation, must be a number
# \u670D\u52A1\u5668\u540D\u79F0 \u53C2\u4E0E\u5206\u5E03\u5F0FID\u751F\u6210 \u8BF7\u786E\u4FDD\u662F\u6570\u5B57
gzb.system.server.name=001

# HTTP listening port
# \u76D1\u542C\u7684http\u7AEF\u53E3
gzb.system.server.http.port=8082

# TCP port
# tcp\u7AEF\u53E3
gzb.system.server.tcp.port=

# UDP port
# udp\u7AEF\u53E3
gzb.system.server.upd.port=

# WebSocket port (not implemented yet)
# ws\u7AEF\u53E3 \u6682\u672A\u5B9E\u73B0
gzb.system.server.ws.port=

# Set the maximum pipeline
# \u6D41\u6C34\u7EBF\u5199\u5408\u5E76\u7684\u6700\u5927\u9650\u5236
gzb.system.server.pipeline=64

# IO thread pool size (Netty main thread), do not modify if you don't understand, default: CPU cores / 10 (minimum 1)
# IO\u7EBF\u7A0B\u6C60 \u7EBF\u7A0B\u6570 \u5BF9\u5E94netty \u4E3B\u7EBF\u7A0B \u4E0D\u61C2 \u522B\u586B  \u9ED8\u8BA4cpu\u6838\u6570 /10 \u81F3\u5C111
gzb.system.server.main.thread.num=1

# IO thread pool size (Netty event loop thread), do not modify if you don't understand, default: CPU cores * 2
# IO\u7EBF\u7A0B\u6C60 \u7EBF\u7A0B\u6570 \u5BF9\u5E94netty \u4E8B\u4EF6\u5FAA\u73AF\u7EBF\u7A0B \u4E0D\u61C2 \u522B\u586B  \u9ED8\u8BA4cpu\u6838\u6570*2
gzb.system.server.io.thread.num=1

# Business thread pool size, auto-scaling by default until CPU load limit is reached
# \u4E1A\u52A1\u7EBF\u7A0B\u6C60 \u7EBF\u7A0B\u6570   \u9ED8\u8BA4\u81EA\u52A8\u6269\u5C55 \u76F4\u5230\u8FBE\u5230cpu\u8D1F\u8F7D\u4E0A\u9650
gzb.system.server.biz.thread.num=1

# Maximum waiting queue length when threads are full, default: CPU cores * 100
# \u5F53\u7EBF\u7A0B\u5360\u6EE1\u65F6 \u7B49\u5F85\u961F\u5217\u6700\u5927\u957F\u5EA6   \u9ED8\u8BA4cpu\u6838\u6570*100
gzb.system.server.biz.await.num=120000

# POST data size limit (MB), -1 = unlimited, integer type
# post\u6570\u636E\u5305\u5927\u5C0F\u9650\u5236 -1\u4E3A\u4E0D\u9650\u5236 \u5927\u4E8E0\u5219\u4E3A \u6700\u5927\u9650\u5236 \u5355\u4F4DMB  \u7C7B\u578B\u6574\u6570\u578B
gzb.system.server.http.post.size=-1

# Domain
# domain
gzb.system.server.http.domain=0.0.0.0

# Enable gzip compression
# \u662F\u5426\u542F\u7528gzip\u538B\u7F29
gzb.system.server.http.compression=false

# Minimum size to enable gzip compression
# \u6700\u5C0F\u542F\u7528gzip\u538B\u7F29\u7684\u5927\u5C0F
gzb.system.server.http.compression.min.size=2048

# Static resource directory
# \u9759\u6001\u8D44\u6E90\u76EE\u5F55
gzb.system.server.http.static.dir=this:src/main/resources/templates

# Global temporary directory
# \u5168\u5C40\u4E34\u65F6\u76EE\u5F55
gzb.system.server.http.tmp.dir=this:tmp

# Loading type: file or http
# \u52A0\u8F7D\u7C7B\u578B file  or http
gzb.system.code.type=file

# Hot update authentication token
# \u66F4\u65B0\u6743\u9650\u51ED\u8BC1
gzb.system.hot.update.token=123456789

# Source code directory, empty = not loaded, multiple directories separated by commas
# \u6E90\u4EE3\u7801\u76EE\u5F55 \u5982\u679C\u4E3A\u7A7A\u5219\u4E0D\u52A0\u8F7D\u4EE3\u7801 \u591A\u4E2A\u4EE3\u7801\u76EE\u5F55,\u5206\u5272
gzb.system.code.file.dir=this:src/main/java/com

# Source code encryption (AES_CBC_128 key), empty = no encryption
# \u6E90\u4EE3\u7801\u662F\u5426\u52A0\u5BC6 AES_CBC_128 \u79D8\u94A5  \u4E3A\u7A7A\u7684\u8BDD\u9ED8\u8BA4\u4E0D\u52A0\u5BC6
gzb.system.code.file.pwd=

# Source code encryption (AES_CBC_128 IV), empty = no encryption
# \u6E90\u4EE3\u7801\u662F\u5426\u52A0\u5BC6 AES_CBC_128 \u5411\u91CF  \u4E3A\u7A7A\u7684\u8BDD\u9ED8\u8BA4\u4E0D\u52A0\u5BC6
gzb.system.code.file.iv=

# Session type: redis / map
# session\u7C7B\u578B redis map
gzb.system.http.session.type=map

# Session expiration time (seconds)
# session \u5931\u6548\u65F6\u95F4 \u79D2
gzb.system.http.session.time=36000

# Cache type: redis / map
# Cache \u7C7B\u578B redis map
gzb.system.cache.type=map

# Database query cache type, default: map, optional: redis / map
# \u6570\u636E\u5E93 \u67E5\u8BE2\u7F13\u5B58\u7C7B\u578B \u9ED8\u8BA4map  \u53EF\u9009 redis map
gzb.system.db.cache.type=map

# Log mode: 0=show only, 1=save only, 2=none, 3=show & save
# 0 \u663E\u793A\u4F46\u4E0D\u4FDD\u5B58 1 \u4FDD\u5B58\u4F46\u4E0D\u663E\u793A 2 \u4E0D\u663E\u793A\u4E5F\u4E0D\u4FDD\u5B58 3 \u663E\u793A\u4E14\u4FDD\u5B58
gzb.log.trace=2
gzb.log.debug=0
gzb.log.info=0
gzb.log.warn=0
gzb.log.error=0
gzb.log.path=this:logs/

# Log retention days (deleted after expiration, executed daily around 0 AM)
# \u65E5\u5FD7\u4FDD\u5B58\u5929\u6570 \u8D85\u671F\u4F1A\u88AB\u5220\u9664 \u6BCF\u5929\u6267\u884C\u4E00\u6B21 0\u70B9\u5DE6\u53F3
gzb.log.save.days=1

# File upload directory
# \u4E0A\u4F20\u6587\u4EF6\u76EE\u5F55
key.system.upload.dir=this:/src/main/resources/templates/files

# Captcha storage key
# \u9A8C\u8BC1\u7801\u50A8\u5B58key
key.system.login.image.code=system_login_image_code

# Login info storage key
# \u767B\u5F55\u4FE1\u606F\u50A8\u5B58KEY
key.system.login.info=system_login_info

# Login page URL
# \u767B\u9646\u754C\u9762\u5730\u5740
key.system.login.page=login.html

# JSON API response template key configuration {code:1,message:'',data:[],time:'',url:'',page:1,size:10,total:100}
# json\u914D\u7F6E api\u54CD\u5E94\u6A21\u677F\u4E2D\u7684\u53C2\u6570\u540D\u63A7\u5236
# Common config: count, limit, total, size

# Status code key
# \u72B6\u6001\u7801 \u952E\u540D\u79F0
json.code=code

# Response message key
# \u54CD\u5E94\u6587\u672C \u952E\u540D\u79F0
json.message=message

# Response data key
# \u54CD\u5E94\u6570\u636E \u952E\u540D\u79F0
json.data=data

# Response time key
# \u54CD\u5E94\u65F6\u95F4 \u952E\u540D\u79F0
json.time=time

# Redirect URL key
# \u54CD\u5E94\u8DF3\u8F6C\u5730\u5740 \u952E\u540D\u79F0
json.jump=url

# Pagination page number key
# \u5206\u9875\u9875\u7801 \u952E\u540D\u79F0
json.page=page

# Pagination page size key
# \u5206\u9875\u6BCF\u9875\u6570\u91CF \u952E\u540D\u79F0
json.size=limit

# Pagination total count key
# \u5206\u9875\u603B\u6570\u91CF \u952E\u540D\u79F0
json.total=total

# Success status code
# \u54CD\u5E94\u72B6\u6001\u7801\u914D\u7F6E \u6210\u529F
json.success.code=1

# Fail status code
# \u54CD\u5E94\u72B6\u6001\u7801\u914D\u7F6E \u5931\u8D25
json.fail.code=2

# Error status code
# \u54CD\u5E94\u72B6\u6001\u7801\u914D\u7F6E \u9519\u8BEF
json.error.code=3

# Redirect status code (used with json.jump)
# \u54CD\u5E94\u72B6\u6001\u7801\u914D\u7F6E \u8DF3\u8F6C \uFF08\u914D\u5408 json.jump\uFF09
json.jump.code=4

# Entity inner data key
# \u5B9E\u4F53\u5BF9\u8C61\u5185\u90E8data \u952E\u540D\u79F0
json.entity.data=data

